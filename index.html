<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo – Drugy Automations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #07090f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(1,96,244,0.18) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -58%);
      width: 700px;
      height: 420px;
      background: radial-gradient(ellipse at center,
        rgba(1,96,244,0.26) 0%,
        rgba(1,96,244,0.08) 45%,
        transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: pulse 5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: .75; transform: translate(-50%,-58%) scale(1); }
      50%      { opacity: 1;   transform: translate(-50%,-58%) scale(1.07); }
    }

    .center {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      text-align: center;
      padding: 0 24px;
    }

    .logo {
      width: clamp(220px, 38vw, 420px);
      height: auto;
      display: block;
      animation: fadeUp .7s cubic-bezier(.22,.68,0,1.2) both;
    }

    .sep {
      width: 48px;
      height: 2px;
      background: #0160f4;
      border-radius: 99px;
      opacity: .7;
      animation: fadeUp .7s .15s cubic-bezier(.22,.68,0,1.2) both;
    }

    h1 {
      color: #f0f4ff;
      font-size: clamp(18px, 3vw, 26px);
      font-weight: 700;
      letter-spacing: -0.02em;
      animation: fadeUp .7s .25s cubic-bezier(.22,.68,0,1.2) both;
    }

    p {
      color: #5a7aaa;
      font-size: clamp(13px, 1.8vw, 15px);
      font-weight: 400;
      animation: fadeUp .7s .35s cubic-bezier(.22,.68,0,1.2) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; }
    }
  </style>
</head>
<body>

  <div class="center">
    <img class="logo" src="Logo_s_textom.jpg" alt="Drugy Automations" />
    <div class="sep"></div>
    <h1>Drugy Automations – Demo</h1>
    <p>Kliknite na tlačidlo vpravo dole 👇</p>
  </div>

  <!-- ===== CHATBOT WIDGET ===== -->
  <script type="module">
    import Chatbot from "https://cdn.n8nchatui.com/v1/embed.js";
    Chatbot.init({
      "n8nChatUrl": "https://oleginoo2026.app.n8n.cloud/webhook/00c0d7bd-9785-4b9a-9c5e-752eccbf7e7c/chat",
      "metadata": {},
      "theme": {
        "button": {
          "backgroundColor": "#0160f4",
          "right": 20,
          "bottom": 20,
          "size": 50,
          "iconColor": "#ffffff",
          "customIconSrc": "https://www.svgrepo.com/show/362552/chat-centered-dots-bold.svg",
          "customIconSize": 60,
          "customIconBorderRadius": 15,
          "autoWindowOpen": { "autoOpen": false, "openDelay": 2 },
          "borderRadius": "rounded",
          "draggable": false
        },
        "tooltip": {
          "showTooltip": true,
          "tooltipMessage": "Ak máte otázky, pýtajte sa!",
          "tooltipBackgroundColor": "#d1e3ff",
          "tooltipTextColor": "#000000",
          "tooltipFontSize": 15,
          "hideTooltipOnMobile": true
        },
        "allowProgrammaticMessage": false,
        "chatWindow": {
          "borderRadiusStyle": "rounded",
          "avatarBorderRadius": 25,
          "messageBorderRadius": 15,
          "showTitle": true,
          "title": "AI Chat asistent ",
          "avatarSize": 36,
          "welcomeMessage": "Ahoj!👋 Pomôžem ti s otázkami o tom, ako funguje takýto chatbot 🤖 od Drugy Automations⚡. Čo by si chcel vedieť? 🤔",
          "errorMessage": "Ups, niečo sa pokazilo. 🙁 Skús to prosím znova, alebo nás kontaktuj priamo na [ drugyautomations@gmail.com / 0902 694 316 ].",
          "backgroundColor": "#d1e3ff",
          "height": 500,
          "width": 400,
          "fontSize": 15,
          "starterPromptFontSize": 13,
          "renderHTML": true,
          "clearChatOnReload": false,
          "showScrollbar": false,
          "botMessage": {
            "backgroundColor": "#0160f4",
            "textColor": "#fafafa",
            "showAvatar": true,
            "avatarSrc": "https://www.svgrepo.com/show/334455/bot.svg",
            "showCopyToClipboardIcon": false
          },
          "userMessage": {
            "backgroundColor": "#fff6f3",
            "textColor": "#050505",
            "showAvatar": true,
            "avatarSrc": "https://www.svgrepo.com/show/532363/user-alt-1.svg"
          },
          "textInput": {
            "placeholder": "Napíš svoju otázku...",
            "backgroundColor": "#ffffff",
            "textColor": "#000000",
            "sendButtonColor": "#0160f4",
            "maxChars": 499,
            "maxCharsWarningMessage": "Správa je príliš dlhá. Skráť ju prosím na maximum 500 znakov.",
            "autoFocus": true,
            "borderRadius": 20,
            "sendButtonBorderRadius": 12
          }
        }
      }
    });
  </script>

</body>
</html>
